name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "VERSION=$(python3 -c "import json; print(json.load(open('version.json'))['version'])")" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      # Build the web assets into www/
      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/
          cp style.css www/ 2>/dev/null || true
          cp unreal.js www/ 2>/dev/null || true
          cp version.json www/
          cp icon.png www/ 2>/dev/null || true

      # npx cap requires @capacitor/cli to be installed — it is now in devDependencies
      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: visionai-debug-${{ steps.version.outputs.VERSION }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
