<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Unreal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- Top Bar -->
    <div class="topbar">
      <span class="topbar-name">U N R E A L</span>
      <span class="topbar-status" id="statusDot">● ONLINE</span>
    </div>

    <!-- HUD Ring Visualizer -->
    <div class="hud-container">
      <div class="outer-ring" id="outerRing">
        <div class="middle-ring" id="middleRing">
          <div class="inner-circle" id="innerCircle">
            <div class="core-pulse" id="corePulse"></div>
            <div class="mic-icon" id="micIcon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="9" y="2" width="6" height="11" rx="3" fill="currentColor"/>
                <path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="8" y1="22" x2="16" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </div>
          </div>
        </div>
      </div>
      <!-- Arc decorations -->
      <div class="arc arc1"></div>
      <div class="arc arc2"></div>
      <div class="arc arc3"></div>
    </div>

    <!-- Tap to speak button -->
    <button class="speak-btn" id="speakBtn" onclick="toggleListening()">
      <span id="btnText">TAP TO SPEAK</span>
    </button>

    <!-- Transcript bubble -->
    <div class="transcript-box" id="transcriptBox">
      <span class="transcript-label">YOU</span>
      <p id="transcriptText">Say something to Unreal...</p>
    </div>

    <!-- Response area -->
    <div class="response-box" id="responseBox">
      <span class="response-label">UNREAL</span>
      <p id="responseText">Systems online. How can I assist you?</p>
    </div>

    <!-- Bottom nav -->
    <div class="bottom-nav">
      <button class="nav-btn" onclick="clearChat()">⟳ RESET</button>
      <button class="nav-btn" id="voiceToggle" onclick="toggleVoice()">🔊 VOICE ON</button>
      <button class="nav-btn" onclick="showSettings()">⚙ CONFIG</button>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel" style="display:none">
      <div class="settings-inner">
        <h3>⚙ CONFIGURATION</h3>
        <label>GROQ API KEY</label>
        <input type="password" id="apiKeyInput" placeholder="gsk_..." />
        <label>WAKE PHRASE (optional)</label>
        <input type="text" id="wakeInput" placeholder="e.g. Hey Unreal" />
        <label>VOICE STYLE</label>
        <select id="voiceSelect">
          <option value="">Auto (System Default)</option>
        </select>
        <button class="save-btn" onclick="saveSettings()">SAVE</button>
        <button class="close-btn" onclick="closeSettings()">CLOSE</button>
      </div>
    </div>

  </div>

  <script src="unreal.js"></script>
</body>
</html>
